<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sevn Assurance — Chainlink CRE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* Chainlink-derived light palette */
        --cl-white: #ffffff;
        --cl-bg: #f5f7fd;
        --cl-bg-warm: #fafbff;
        --cl-surface: #ffffff;
        --cl-surface-elevated: #f0f3fb;

        /* Brand blues */
        --cl-navy: #0a0b2e;
        --cl-navy-mid: #1a1b4b;
        --cl-blue: #375bd2;
        --cl-blue-bright: #4a6ee0;
        --cl-blue-pale: #e8edfb;
        --cl-blue-wash: rgba(55, 91, 210, 0.06);
        --cl-blue-glow: rgba(55, 91, 210, 0.12);

        /* Chainlink gold */
        --cl-gold: #2b6cb0;
        --cl-gold-bright: #375bd2;

        /* Text */
        --cl-text-primary: #0a0b2e;
        --cl-text-secondary: #4a5072;
        --cl-text-tertiary: #8890ab;
        --cl-text-muted: #b0b6cc;

        /* Borders */
        --cl-border: #e2e6f2;
        --cl-border-light: #eef1f8;
        --cl-border-accent: rgba(55, 91, 210, 0.2);

        /* Status */
        --cl-green: #0d9f6e;
        --cl-green-bg: #ecfdf5;
        --cl-green-border: #a7f3d0;
        --cl-amber: #d97706;
        --cl-amber-bg: #fffbeb;
        --cl-amber-border: #fde68a;
        --cl-red: #dc2626;
        --cl-red-bg: #fef2f2;
        --cl-red-border: #fecaca;

        /* Shadows */
        --cl-shadow-sm: 0 1px 2px rgba(10, 11, 46, 0.04);
        --cl-shadow-md: 0 2px 8px rgba(10, 11, 46, 0.06), 0 0 1px rgba(10, 11, 46, 0.08);
        --cl-shadow-lg: 0 4px 24px rgba(10, 11, 46, 0.08), 0 0 1px rgba(10, 11, 46, 0.1);
        --cl-shadow-blue: 0 4px 16px rgba(55, 91, 210, 0.2);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--cl-bg);
        color: var(--cl-text-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--cl-bg); }
      ::-webkit-scrollbar-thumb { background: var(--cl-border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--cl-blue); }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(2.4); opacity: 0; }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes step-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(55, 91, 210, 0.3); }
        50% { box-shadow: 0 0 0 6px rgba(55, 91, 210, 0); }
      }
      @keyframes slide-right {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
